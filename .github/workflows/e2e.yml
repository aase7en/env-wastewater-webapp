name: E2E smoke tests

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

# Least privilege: this workflow reads code, builds, runs Playwright against
# a prod URL. No write surface needed.
permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # 24 = match the dev machine (npm 11) — see deploy-frontend.yml (CI-1).
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build (catch TS errors before running tests)
        working-directory: frontend
        env:
          GH_PAGES_BASE: /env-wastewater-webapp/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Run smoke tests against the deployed prod URL
        working-directory: frontend
        env:
          E2E_BASE_URL: https://aase7en.github.io/env-wastewater-webapp/
        run: npm run e2e:prod

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  # Telegram notify — failure on main + every PR result.
  #
  # e2e.yml triggers on frontend/** changes + PRs, so notifying every
  # success would be noisy. Choice: stay silent on push+pass, alert on
  # push+fail AND on every PR (success + failure) so PR status is visible
  # real-time without opening GitHub.
  #
  # Two layers in one message (chat-spam friendly): human-readable HTML
  # body + embedded `<code>{...JSON...}</code>` payload + HMAC signature
  # for Hermes (Pi5) — see docs/integrations/ci-hermes-protocol.md +
  # ADR-0010. Zero-data: payload carries metadata ONLY.
  #
  # Defensive gate: GitHub forbids `secrets.*` in job-level `if:` (logs may
  # leak the expression), so secrets are hoisted to env vars and checked in
  # the step. Workflow stays green until you set TELEGRAM_BOT_TOKEN +
  # TELEGRAM_CHAT_ID in repo Secrets. Setup: docs/handoff/2026-07-19-
  # track-z-complete.md "Telegram alert setup" section.
  # ─────────────────────────────────────────────────────────────────
  notify:
    needs: smoke
    # Fork-PR gate: GitHub redacts secrets.* for fork PRs anyway, but we
    # also skip the notify job explicitly so a fork PR never runs the
    # payload step. Belt-and-suspenders against any future refactor that
    # might switch to pull_request_target (which DOES expose secrets to
    # forks).
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && (github.event_name == 'pull_request' || failure())
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      HMAC_SECRET: ${{ secrets.HERMES_HMAC_SECRET }}
    steps:
      - name: Skip if Telegram secrets not configured
        if: env.BOT_TOKEN == '' || env.CHAT_ID == ''
        run: echo "::notice::Telegram secrets not set — skipping notify (set TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID in repo Secrets to enable)"

      - name: Build Hermes payload + HMAC
        id: payload
        if: env.BOT_TOKEN != '' && env.CHAT_ID != ''
        env:
          WORKFLOW_NAME: E2E smoke tests
          SMOKE_RESULT: ${{ needs.smoke.result }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - <<'PY'
          import json, hmac, hashlib, os
          result = os.environ["SMOKE_RESULT"]
          error_class = {
            "success":  "e2e-ok",
            "failure":  "e2e-failed",
            "cancelled":"cancelled",
            "skipped":  "skipped",
          }.get(result, "unknown")
          payload = {
            "v": 1,
            "source": "github-ci",
            "event": "workflow_finished",
            "repo": os.environ["GITHUB_REPOSITORY"],
            "workflow": os.environ["WORKFLOW_NAME"],
            "run_id": os.environ["GITHUB_RUN_ID"],
            "commit": os.environ["GITHUB_SHA"][:7],
            "branch": os.environ.get("GITHUB_REF_NAME", "main"),
            "actor": os.environ["GITHUB_ACTOR"],
            "trigger": os.environ["EVENT_NAME"],
            "result": result,
            "error_class": error_class,
          }
          canon = json.dumps(payload, sort_keys=True, separators=(",", ":"))
          secret = os.environ.get("HMAC_SECRET", "")
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"PAYLOAD_JSON<<EOF\n{canon}\nEOF\n")
              if secret:
                  sig = hmac.new(secret.encode(), canon.encode(), hashlib.sha256).hexdigest()
                  inline = f"\n<code>{canon}</code>\n<!--sig:{sig}-->"
                  out.write(f"SIG={sig}\n")
                  out.write(f"PAYLOAD_INLINE<<EOF\n{inline}\nEOF\n")
                  print("::notice::Hermes payload signed (HMAC_SECRET configured)")
              else:
                  out.write("SIG=\n")
                  out.write("PAYLOAD_INLINE=\n")
                  print("::notice::Hermes payload skipped (HERMES_HMAC_SECRET not set — human-only HTML)")
          PY

      - name: Telegram notify
        if: env.BOT_TOKEN != '' && env.CHAT_ID != ''
        uses: appleboy/telegram-action@78c9ef35ffccfe74d3b32e26efcd34c2e283238a  # v1.1.0, pinned 2026-07-23 — @master is a moving tag; this job holds BOT_TOKEN so pin to SHA (supply-chain hygiene)
        with:
          to: ${{ env.CHAT_ID }}
          token: ${{ env.BOT_TOKEN }}
          format: html
          message: |
            <b>${{ github.repository }}</b> — E2E smoke tests
            <b>ผล:</b> ${{ needs.smoke.result }}
            <b>Event:</b> ${{ github.event_name }}
            <b>Commit:</b> <code>${{ github.sha }}</code>
            <b>Author:</b> ${{ github.actor }}
            <b>Message:</b> ${{ github.event.head_commit.message }}
            <b>Run:</b> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">view logs</a>${{ steps.payload.outputs.PAYLOAD_INLINE }}
