name: E2E smoke tests

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # 24 = match the dev machine (npm 11) — see deploy-frontend.yml (CI-1).
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build (catch TS errors before running tests)
        working-directory: frontend
        env:
          GH_PAGES_BASE: /env-wastewater-webapp/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Run smoke tests against the deployed prod URL
        working-directory: frontend
        env:
          E2E_BASE_URL: https://aase7en.github.io/env-wastewater-webapp/
        run: npm run e2e:prod

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  # Telegram notify — failure on main + every PR result.
  #
  # e2e.yml triggers on frontend/** changes + PRs, so notifying every
  # success would be noisy. Choice: stay silent on push+pass, alert on
  # push+fail AND on every PR (success + failure) so PR status is visible
  # real-time without opening GitHub.
  #
  # Defensive gate: GitHub forbids `secrets.*` in job-level `if:` (logs may
  # leak the expression), so secrets are hoisted to env vars and checked in
  # the step. Workflow stays green until you set TELEGRAM_BOT_TOKEN +
  # TELEGRAM_CHAT_ID in repo Secrets. Setup: docs/handoff/2026-07-19-
  # track-z-complete.md "Telegram alert setup" section.
  # ─────────────────────────────────────────────────────────────────
  notify:
    needs: smoke
    if: always() && (github.event_name == 'pull_request' || failure())
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Skip if Telegram secrets not configured
        if: env.BOT_TOKEN == '' || env.CHAT_ID == ''
        run: echo "::notice::Telegram secrets not set — skipping notify (set TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID in repo Secrets to enable)"

      - name: Telegram notify
        if: env.BOT_TOKEN != '' && env.CHAT_ID != ''
        uses: appleboy/telegram-action@master
        with:
          to: ${{ env.CHAT_ID }}
          token: ${{ env.BOT_TOKEN }}
          format: html
          message: |
            <b>${{ github.repository }}</b> — E2E smoke tests
            <b>ผล:</b> ${{ needs.smoke.result }}
            <b>Event:</b> ${{ github.event_name }}
            <b>Commit:</b> <code>${{ github.sha }}</code>
            <b>Author:</b> ${{ github.actor }}
            <b>Message:</b> ${{ github.event.head_commit.message }}
            <b>Run:</b> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">view logs</a>
