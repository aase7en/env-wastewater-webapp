# Regression gate for the Python script layer. The FastAPI backend (and its
# pytest suite) was removed on 2026-07-19 — see docs/work-orders/FASTAPI-removal.md;
# the full app is preserved on the archive/fastapi-backend branch.
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.24"

      - name: Set up Python
        run: uv python install 3.11

      - name: split_sql regression suite
        # Standalone — no DB, no secrets. Guards the statement splitter that
        # every migration passes through (scripts/apply_migration_api.py).
        run: uv run python scripts/test_split_sql.py

  # ─────────────────────────────────────────────────────────────────
  # Telegram notify — failure on main + every PR result.
  #
  # test.yml triggers on every push (no paths filter), so notifying every
  # success would be noisy. Choice: stay silent on push+pass, alert on
  # push+fail AND on every PR (success + failure) so PR status is visible
  # real-time without opening GitHub.
  #
  # Two layers in one message (chat-spam friendly): human-readable HTML
  # body + embedded `<code>{...JSON...}</code>` payload + HMAC signature
  # for Hermes (Pi5) — see docs/integrations/ci-hermes-protocol.md +
  # ADR-0010. Zero-data: payload carries metadata ONLY.
  #
  # Defensive gate: GitHub forbids `secrets.*` in job-level `if:` (logs may
  # leak the expression), so secrets are hoisted to env vars and checked in
  # the step. Workflow stays green until you set TELEGRAM_BOT_TOKEN +
  # TELEGRAM_CHAT_ID in repo Secrets. Setup: docs/handoff/2026-07-19-
  # track-z-complete.md "Telegram alert setup" section.
  # ─────────────────────────────────────────────────────────────────
  notify:
    needs: scripts
    if: always() && (github.event_name == 'pull_request' || failure())
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      HMAC_SECRET: ${{ secrets.HERMES_HMAC_SECRET }}
    steps:
      - name: Skip if Telegram secrets not configured
        if: env.BOT_TOKEN == '' || env.CHAT_ID == ''
        run: echo "::notice::Telegram secrets not set — skipping notify (set TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID in repo Secrets to enable)"

      - name: Build Hermes payload + HMAC
        id: payload
        if: env.BOT_TOKEN != '' && env.CHAT_ID != ''
        env:
          WORKFLOW_NAME: test
          SCRIPTS_RESULT: ${{ needs.scripts.result }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - <<'PY'
          import json, hmac, hashlib, os
          result = os.environ["SCRIPTS_RESULT"]
          error_class = {
            "success":  "test-ok",
            "failure":  "test-failed",
            "cancelled":"cancelled",
            "skipped":  "skipped",
          }.get(result, "unknown")
          payload = {
            "v": 1,
            "source": "github-ci",
            "event": "workflow_finished",
            "repo": os.environ["GITHUB_REPOSITORY"],
            "workflow": os.environ["WORKFLOW_NAME"],
            "run_id": os.environ["GITHUB_RUN_ID"],
            "commit": os.environ["GITHUB_SHA"][:7],
            "branch": os.environ.get("GITHUB_REF_NAME", "main"),
            "actor": os.environ["GITHUB_ACTOR"],
            "trigger": os.environ["EVENT_NAME"],
            "result": result,
            "error_class": error_class,
          }
          canon = json.dumps(payload, sort_keys=True, separators=(",", ":"))
          secret = os.environ.get("HMAC_SECRET", "")
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"PAYLOAD_JSON<<EOF\n{canon}\nEOF\n")
              if secret:
                  sig = hmac.new(secret.encode(), canon.encode(), hashlib.sha256).hexdigest()
                  inline = f"\n<code>{canon}</code>\n<!--sig:{sig}-->"
                  out.write(f"SIG={sig}\n")
                  out.write(f"PAYLOAD_INLINE<<EOF\n{inline}\nEOF\n")
                  print("::notice::Hermes payload signed (HMAC_SECRET configured)")
              else:
                  out.write("SIG=\n")
                  out.write("PAYLOAD_INLINE=\n")
                  print("::notice::Hermes payload skipped (HERMES_HMAC_SECRET not set — human-only HTML)")
          PY

      - name: Telegram notify
        if: env.BOT_TOKEN != '' && env.CHAT_ID != ''
        uses: appleboy/telegram-action@master
        with:
          to: ${{ env.CHAT_ID }}
          token: ${{ env.BOT_TOKEN }}
          format: html
          message: |
            <b>${{ github.repository }}</b> — Test
            <b>ผล:</b> ${{ needs.scripts.result }}
            <b>Event:</b> ${{ github.event_name }}
            <b>Commit:</b> <code>${{ github.sha }}</code>
            <b>Author:</b> ${{ github.actor }}
            <b>Message:</b> ${{ github.event.head_commit.message }}
            <b>Run:</b> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">view logs</a>${{ steps.payload.outputs.PAYLOAD_INLINE }}
