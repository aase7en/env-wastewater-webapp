# Runs the unit test suite on every push/PR to catch regressions early.
# Integration tests (tests/integration/) skip themselves automatically when
# SUPABASE_DB_URL is absent, so this workflow needs no secrets to stay green.
#
# Add a separate `integration` job later with a read-only DB_URL secret if
# you want live ENV_DB verification on every PR.
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.24"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        env:
          # Placeholder — integration tests read this and skip if it contains
          # "unset". Unit tests don't touch the DB at all.
          SUPABASE_DB_URL: postgresql://unset:unset@localhost:5432/unset
          AUTH_MODE: stub
          APP_ENV: test
        run: uv run pytest -q

      - name: Smoke-import the app
        # Catches import-time regressions that pytest collection might miss.
        run: uv run python -c "import app.main; print('app imports OK')"
