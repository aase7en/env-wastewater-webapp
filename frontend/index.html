<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply the saved/OS theme before first paint to avoid a flash of the
      // wrong theme. Runtime switching lives in src/lib/theme.ts (Track F).
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t !== "dark" && t !== "light") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00161B" />
    <meta name="description" content="ระบบบันทึกและติดตามคุณภาพน้ำทิ้ง ระบบบำบัดน้ำเสีย โรงพยาบาลอุทัย" />
    <title>UTH[AI]-ENV — ระบบบำบัดน้ำเสีย รพ.อุทัย</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
